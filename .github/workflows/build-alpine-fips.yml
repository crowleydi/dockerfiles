name: Build alpine-fips Docker image2
env:
  IMAGE_BASE: docker.io/kanstin/alpine-fips
  BASE_VERSION: 3.22

on:
  workflow_dispatch:
    inputs:
      do_publish:
        description: "Publish image after build?"
        required: true
        type: boolean
        default: false
  push:
    branches: [ "main" ]
    paths:
      - "alpine-fips/Dockerfile"

  pull_request:
    branches: [ "main" ]
    paths:
      - "alpine-fips/Dockerfile"

jobs:
  build-push-amd64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Set up tags
        run: |
          echo "LATEST2_TAG=${IMAGE_BASE}-2:latest" >> $GITHUB_ENV
          echo "VERSION2_TAG=${IMAGE_BASE}-2:${BASE_VERSION}" >> $GITHUB_ENV
          echo "LATEST3_TAG=${IMAGE_BASE}-3:latest" >> $GITHUB_ENV
          echo "VERSION3_TAG=${IMAGE_BASE}-3:${BASE_VERSION}" >> $GITHUB_ENV

      - name: Build and push FIPS 140-2
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:alpine-fips"
          build-args: |
            BASE_VERSION=${{ env.BASE_VERSION }}
            OPENSSL_VERSION=3.0.9
          push: |
            ${{ github.event_name == 'workflow_dispatch' && inputs.do_publish == true
             || github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.LATEST2_TAG }}-amd64
            ${{ env.VERSION2_TAG }}-amd64
          # Improved cache configuration
          cache-from: |
            type=gha,scope=alpine-fips-2-amd64-${{ env.BASE_VERSION }}
            type=registry,ref=${{ env.LATEST2_TAG }}-amd64
          cache-to: |
            type=gha,mode=max,scope=alpine-fips-2-amd64-${{ env.BASE_VERSION }},ignore-error=true

      - name: Build and push FIPS 140-3
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:alpine-fips"
          build-args: |
            BASE_VERSION=${{ env.BASE_VERSION }}
            OPENSSL_VERSION=3.1.2
          push: |
            ${{ github.event_name == 'workflow_dispatch' && inputs.do_publish == true
             || github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.LATEST3_TAG }}-amd64
            ${{ env.VERSION3_TAG }}-amd64
          # Improved cache configuration
          cache-from: |
            type=gha,scope=alpine-fips-3-amd64-${{ env.BASE_VERSION }}
            type=registry,ref=${{ env.LATEST3_TAG }}-amd64
          cache-to: |
            type=gha,mode=max,scope=alpine-fips-3-amd64-${{ env.BASE_VERSION }},ignore-error=true

  build-push-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Set up tags
        run: |
          echo "LATEST2_TAG=${IMAGE_BASE}-2:latest" >> $GITHUB_ENV
          echo "VERSION2_TAG=${IMAGE_BASE}-2:${BASE_VERSION}" >> $GITHUB_ENV
          echo "LATEST3_TAG=${IMAGE_BASE}-3:latest" >> $GITHUB_ENV
          echo "VERSION3_TAG=${IMAGE_BASE}-3:${BASE_VERSION}" >> $GITHUB_ENV

      - name: Build and push FIPS 140-2
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:alpine-fips"
          build-args: |
            BASE_VERSION=${{ env.BASE_VERSION }}
            OPENSSL_VERSION=3.0.9
          push: |
            ${{ github.event_name == 'workflow_dispatch' && inputs.do_publish == true
             || github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.LATEST2_TAG }}-arm64
            ${{ env.VERSION2_TAG }}-arm64
          # Improved cache configuration
          cache-from: |
            type=gha,scope=alpine-fips-2-arm64-${{ env.BASE_VERSION }}
            type=registry,ref=${{ env.LATEST2_TAG }}-arm64
          cache-to: |
            type=gha,mode=max,scope=alpine-fips-2-arm64-${{ env.BASE_VERSION }},ignore-error=true

      - name: Build and push FIPS 140-3
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:alpine-fips"
          build-args: |
            BASE_VERSION=${{ env.BASE_VERSION }}
            OPENSSL_VERSION=3.1.2
          push: |
            ${{ github.event_name == 'workflow_dispatch' && inputs.do_publish == true
             || github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.LATEST3_TAG }}-arm64
            ${{ env.VERSION3_TAG }}-arm64
          # Improved cache configuration
          cache-from: |
            type=gha,scope=alpine-fips-3-arm64-${{ env.BASE_VERSION }}-3
            type=registry,ref=${{ env.LATEST3_TAG }}-arm64
          cache-to: |
            type=gha,mode=max,scope=alpine-fips-3-arm64-${{ env.BASE_VERSION }},ignore-error=true

  create-push-manifests:
    if: github.ref == 'refs/heads/main' && inputs.do_publish == true
    runs-on: ubuntu-24.04
    needs: [build-push-arm64, build-push-amd64]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up tags
        run: |
          echo "LATEST2_TAG=${IMAGE_BASE}-2:latest" >> $GITHUB_ENV
          echo "VERSION2_TAG=${IMAGE_BASE}-2:${BASE_VERSION}" >> $GITHUB_ENV
          echo "LATEST3_TAG=${IMAGE_BASE}-3:latest" >> $GITHUB_ENV
          echo "VERSION3_TAG=${IMAGE_BASE}-3:${BASE_VERSION}" >> $GITHUB_ENV

      - name: Create manifests and push
        run: |
          arm64sha2=$(docker manifest inspect ${{ env.LATEST2_TAG }}-arm64 \
            | jq -r '.manifests[] | select(.platform.architecture == "arm64") | .digest')
          amd64sha2=$(docker manifest inspect ${{ env.LATEST2_TAG }}-amd64 \
            | jq -r '.manifests[] | select(.platform.architecture == "amd64") | .digest')
          docker manifest create ${{ env.LATEST2_TAG }} \
            ${{ env.IMAGE_BASE }}@$arm64sha2 \
            ${{ env.IMAGE_BASE }}@$amd64sha2
          docker manifest push -p ${{ env.LATEST2_TAG }}
          docker manifest create ${{ env.VERSION2_TAG }} \
            ${{ env.IMAGE_BASE }}@$arm64sha2 \
            ${{ env.IMAGE_BASE }}@$amd64sha2
          docker manifest push -p ${{ env.VERSION2_TAG }}
          arm64sha3=$(docker manifest inspect ${{ env.LATEST3_TAG }}-arm64 \
            | jq -r '.manifests[] | select(.platform.architecture == "arm64") | .digest')
          amd64sha3=$(docker manifest inspect ${{ env.LATEST3_TAG }}-amd64 \
            | jq -r '.manifests[] | select(.platform.architecture == "amd64") | .digest')
          docker manifest create ${{ env.LATEST3_TAG }} \
            ${{ env.IMAGE_BASE }}@$arm64sha3 \
            ${{ env.IMAGE_BASE }}@$amd64sha3
          docker manifest push -p ${{ env.LATEST3_TAG }}
          docker manifest create ${{ env.VERSION3_TAG }} \
            ${{ env.IMAGE_BASE }}@$arm64sha3 \
            ${{ env.IMAGE_BASE }}@$amd64sha3
          docker manifest push -p ${{ env.VERSION3_TAG }}

